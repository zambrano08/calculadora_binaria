<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Binaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-cuaderno {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 2rem;
            margin-top: 20px;
            overflow-x: auto;
        }

        .operacion-grid {
            display: grid;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem;
            font-weight: bold;
            width: fit-content;
            margin: 0 auto;
            justify-items: center;
        }

        .bit { width: 35px; text-align: center; }
        .acarreo { color: #ff4d4d; font-size: 1.1rem; }
        
        .linea-resultado {
            grid-column: 1 / -1;
            width: 100%;
            height: 3px;
            background-color: #333;
            margin: 5px 0;
        }

        .signo { color: #555; width: 35px; text-align: center; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">Aritmética Binaria</h1>
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form method="POST" class="card p-4 shadow-sm">
                    <div class="mb-3">
                        <label class="form-label">Primer número binario</label>
                        <input type="text" name="num1" class="form-control" pattern="[01]+" placeholder="Ej: 1010" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Segundo número binario</label>
                        <input type="text" name="num2" class="form-control" pattern="[01]+" placeholder="Ej: 1101" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Calcular Suma</button>
                </form>

                {% if proc %}
                <div class="card-cuaderno text-center">
                    <h5 class="text-muted mb-4">Procedimiento:</h5>
                        <div class="operacion-grid" data-cols="{{ proc.total_cols + 1 }}">
                        
                        <!-- FILA ACARREOS (un espacio vacío para el signo) -->
                        <div class="signo"></div>
                        {% for bit in proc.bits_acarreos %}
                            <div class="bit acarreo">{{ bit | safe }}</div>
                        {% endfor %}

                        <!-- FILA A -->
                        <div class="signo"></div>
                        {% for bit in proc.bits_a %}
                            <div class="bit">{{ bit }}</div>
                        {% endfor %}

                        <!-- FILA B (Con el signo +) -->
                        <div class="signo">+</div>
                        {% for bit in proc.bits_b %}
                            <div class="bit">{{ bit }}</div>
                        {% endfor %}

                        <!-- LÍNEA -->
                        <div class="linea-resultado"></div>

                        <!-- RESULTADO -->
                        <div class="signo"></div>
                        {% for bit in proc.bits_resultado %}
                            <div class="bit">{{ bit }}</div>
                        {% endfor %}
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.operacion-grid[data-cols]').forEach(function (grid) {
                var cols = grid.getAttribute('data-cols');
                if (cols) {
                    grid.style.gridTemplateColumns = 'repeat(' + cols + ', 35px)';
                }
            });
        });
    </script>
</body>
</html>
